<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pulse Report: Groww</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#690005",
                        "inverse-surface": "#e5e1e4",
                        "on-secondary-fixed": "#07006c",
                        "on-surface": "#e5e1e4",
                        "primary": "#44edb7",
                        "on-background": "#e5e1e4",
                        "surface-tint": "#2fe0aa",
                        "inverse-primary": "#006c4f",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#00513b",
                        "primary-container": "#00d09c",
                        "on-primary-fixed": "#002116",
                        "secondary-fixed-dim": "#c0c1ff",
                        "secondary-container": "#3131c0",
                        "on-tertiary": "#2f3132",
                        "tertiary": "#d2d3d5",
                        "surface-container-highest": "#353437",
                        "on-tertiary-fixed-variant": "#454749",
                        "inverse-on-surface": "#313032",
                        "surface": "#131315",
                        "outline": "#85948c",
                        "surface-dim": "#131315",
                        "on-primary": "#003828",
                        "on-tertiary-container": "#46484a",
                        "surface-bright": "#39393b",
                        "on-surface-variant": "#bacac1",
                        "tertiary-fixed-dim": "#c6c6c8",
                        "background": "#131315",
                        "surface-container-high": "#2a2a2c",
                        "secondary-fixed": "#e1e0ff",
                        "surface-variant": "#353437",
                        "surface-container-lowest": "#0e0e10",
                        "on-secondary": "#1000a9",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "outline-variant": "#3c4a43",
                        "surface-container-low": "#1c1b1d",
                        "error": "#ffb4ab",
                        "surface-container": "#201f21",
                        "tertiary-container": "#b6b7b9",
                        "on-tertiary-fixed": "#1a1c1d",
                        "secondary": "#c0c1ff",
                        "on-primary-container": "#00533c",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#e2e2e4",
                        "on-secondary-container": "#b0b2ff",
                        "primary-fixed-dim": "#2fe0aa",
                        "primary-fixed": "#59fdc5"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "base": "8px",
                        "margin-mobile": "16px",
                        "card-gap": "24px",
                        "gutter": "24px",
                        "container-padding": "32px"
                    },
                    fontFamily: {
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    fontSize: {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-card {
            background-color: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            border: 1px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.02)), linear-gradient(to bottom right, rgba(255,255,255,0.15), rgba(255,255,255,0.02));
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }
        .theme-content {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .theme-content.active {
            display: block;
            opacity: 1;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-transition {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen overflow-hidden flex font-body-md text-body-md">
<aside class="fixed left-0 top-0 h-full w-64 border-r border-white/10 bg-surface/80 backdrop-blur-xl shadow-2xl flex flex-col p-base z-50">
<div class="mb-4 p-4">
<h1 class="font-display-lg text-display-lg font-extrabold text-primary tracking-tighter text-[32px] leading-tight">Pulse</h1>
</div>
<div class="px-4 mb-4">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-3 rounded-lg font-bold hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add</span>
                    New Report
                </button>
</div>
<div class="flex-1 overflow-y-auto px-2" id="report-list">
<!-- Report selector list will be injected here -->
</div>
<div class="mt-auto pt-4 border-t border-white/10">
<div class="flex items-center gap-3 px-4 pb-4">
<div class="w-10 h-10 rounded-full bg-surface-variant border border-white/10 flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface">Pulse Report</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Premium Analytics</p>
</div>
</div>
</div>
</aside>
<main class="ml-64 flex-1 h-full overflow-y-auto p-container-padding bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-surface-container-high/40 via-background to-background fade-transition" id="main-content">
<header class="mb-12">
<h1 class="font-display-lg text-display-lg font-extrabold text-on-surface mb-2">Pulse Report: <span id="report-title-app">Groww</span> <span class="text-primary/70" id="report-title-period">(Apr 15 - Jun 10)</span></h1>
</header>
<section class="grid grid-cols-1 md:grid-cols-3 gap-card-gap mb-12">
<div class="glass-card p-6 flex flex-col justify-between hover:shadow-[0_0_20px_rgba(0,208,156,0.1)] transition-shadow">
<div class="flex justify-between items-start mb-4">
<span class="font-label-md text-label-md text-on-surface-variant">Total Reviews</span>
<span class="material-symbols-outlined text-primary">forum</span>
</div>
<div class="flex items-end gap-3">
<span class="font-headline-lg text-headline-lg text-on-surface" id="stat-reviews">1,240</span>
<span class="font-label-md text-label-md text-primary bg-primary/10 px-2 py-1 rounded-full mb-1" id="stat-review-change">+12%</span>
</div>
</div>
<div class="glass-card p-6 flex flex-col justify-between hover:shadow-[0_0_20px_rgba(0,208,156,0.1)] transition-shadow">
<div class="flex justify-between items-start mb-4">
<span class="font-label-md text-label-md text-on-surface-variant">Average Rating</span>
<span class="material-symbols-outlined text-secondary">star</span>
</div>
<div class="flex items-center gap-2">
<span class="font-headline-lg text-headline-lg text-on-surface" id="stat-rating">4.2</span>
<span class="font-headline-md text-headline-md text-on-surface-variant">/5</span>
<div class="flex ml-2">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-surface-variant text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
</div>
<div class="glass-card p-6 flex flex-col justify-between hover:shadow-[0_0_20px_rgba(0,208,156,0.1)] transition-shadow">
<div class="flex justify-between items-start mb-4">
<span class="font-label-md text-label-md text-on-surface-variant">Total Themes</span>
<span class="material-symbols-outlined text-primary-container">category</span>
</div>
<div class="flex items-end">
<span class="font-headline-lg text-headline-lg text-primary-container" id="stat-themes">8</span>
</div>
</div>
</section>
<div class="grid grid-cols-1 gap-gutter flex-col">
<section class="glass-card p-8 self-start">
<h3 class="font-headline-md text-headline-md text-on-surface mb-6 border-b border-white/10 pb-4">Rating Distribution</h3>
<div class="space-y-5" id="rating-bars">
</div>
</section>
<section class="flex flex-col gap-6">
<div class="flex justify-between items-end mb-2">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Key Themes</h2>
<span class="font-label-md text-label-md text-on-surface-variant bg-surface-variant/50 px-3 py-1 rounded-full border border-white/5">Auto-categorized by AI</span>
</div>
<div class="space-y-4" id="themes-container">
</div>
</section>
</div>
</main>
<script>
        const reportsData = [
            {
                id: 'report-1',
                app: 'Groww',
                period: 'Jun 03 - Jun 10',
                stats: { reviews: '1,350', reviewChange: '+8%', rating: '4.4', themes: '9' },
                ratings: [
                    { stars: 5, percentage: 70 },
                    { stars: 4, percentage: 15 },
                    { stars: 3, percentage: 8 },
                    { stars: 2, percentage: 4 },
                    { stars: 1, percentage: 3 }
                ],
                themes: [
                    {
                        id: 'theme-1',
                        title: 'Fast Performance',
                        icon: 'speed',
                        summary: "Users are highly satisfied with the app's speed and responsiveness, noting significant improvements in load times.",
                        actions: [
                            "Maintain current caching strategy.",
                            "Monitor CDN performance globally."
                        ],
                        reviews: [
                            "The app is incredibly fast! Best performance I've seen.",
                            "Pages load instantly now, great job on the update."
                        ]
                    },
                    {
                        id: 'theme-2',
                        title: 'User Interface',
                        icon: 'design_services',
                        summary: "The new layout is generally well-received, though some users find the navigation menu slightly confusing initially.",
                        actions: [
                            "Conduct A/B testing on the new sidebar navigation.",
                            "Add tooltips for first-time users on key screens."
                        ],
                        reviews: [
                            "Love the dark mode and clean look.",
                            "Looks modern, but took a minute to find the settings."
                        ]
                    }
                ]
            },
            {
                id: 'report-2',
                app: 'Groww',
                period: 'May 27 - Jun 03',
                stats: { reviews: '1,240', reviewChange: '+12%', rating: '4.2', themes: '8' },
                ratings: [
                    { stars: 5, percentage: 65 },
                    { stars: 4, percentage: 20 },
                    { stars: 3, percentage: 8 },
                    { stars: 2, percentage: 4 },
                    { stars: 1, percentage: 3 }
                ],
                themes: [
                    {
                        id: 'theme-1',
                        title: 'Customer Support',
                        icon: 'support_agent',
                        summary: "Response times are praised, but users request more self-service options and clearer resolution tracking.",
                        actions: [
                            "Expand the FAQ section in the Help Center.",
                            "Implement a visible ticket status tracker in-app.",
                            "Train support agents on the new API endpoints."
                        ],
                        reviews: [
                            "Support replied within 10 minutes, very helpful.",
                            "I wish I could track my issue without emailing again.",
                            "Agent Sarah was fantastic and solved my billing problem."
                        ]
                    },
                    {
                        id: 'theme-2',
                        title: 'Bug Fixes Needed',
                        icon: 'bug_report',
                        summary: "Some users reported occasional crashes when switching between tabs rapidly.",
                        actions: [
                            "Investigate memory leak on tab switch.",
                            "Deploy hotfix for Android users."
                        ],
                        reviews: [
                            "App crashed twice today while looking at charts.",
                            "Please fix the lagging when switching screens."
                        ]
                    }
                ]
            },
            {
                id: 'report-3',
                app: 'Groww',
                period: 'May 20 - May 27',
                stats: { reviews: '1,100', reviewChange: '+5%', rating: '4.0', themes: '7' },
                ratings: [
                    { stars: 5, percentage: 60 },
                    { stars: 4, percentage: 25 },
                    { stars: 3, percentage: 10 },
                    { stars: 2, percentage: 3 },
                    { stars: 1, percentage: 2 }
                ],
                themes: [
                    {
                        id: 'theme-1',
                        title: 'New Feature Request',
                        icon: 'new_releases',
                        summary: "Users are asking for a dark mode option and more detailed stock analysis tools.",
                        actions: [
                            "Prioritize dark mode development.",
                            "Gather requirements for advanced charting tools."
                        ],
                        reviews: [
                            "When are we getting dark mode? My eyes hurt at night.",
                            "Need more technical indicators on the charts."
                        ]
                    }
                ]
            }
        ];

        let currentReportId = 'report-2';

        function renderSidebar() {
            const listContainer = document.getElementById('report-list');
            listContainer.innerHTML = '';
            
            reportsData.forEach(report => {
                const isActive = report.id === currentReportId;
                const activeClasses = isActive 
                    ? 'bg-primary/10 text-primary shadow-[0_0_20px_rgba(68,237,183,0.1)] border-r-2 border-primary' 
                    : 'text-on-surface-variant hover:bg-white/5 hover:text-on-surface border-r-2 border-transparent';
                
                listContainer.innerHTML += `
                    <button class="w-full text-left flex flex-col gap-1 px-4 py-3 rounded-lg font-medium transition-all duration-300 mb-1 ${activeClasses}" onclick="switchReport('${report.id}')">
                        <span class="font-label-md text-label-md ${isActive ? 'text-primary font-bold' : 'text-on-surface'}">${report.app}</span>
                        <span class="font-label-sm text-label-sm opacity-80">${report.period}</span>
                    </button>
                `;
            });
        }

        function switchReport(id) {
            if (currentReportId === id) return;
            currentReportId = id;
            
            const mainContent = document.getElementById('main-content');
            mainContent.style.opacity = '0';
            
            setTimeout(() => {
                renderSidebar();
                renderReport();
                mainContent.style.opacity = '1';
            }, 300);
        }

        function renderReport() {
            const report = reportsData.find(r => r.id === currentReportId);
            if (!report) return;

            // Header
            document.getElementById('report-title-app').textContent = report.app;
            document.getElementById('report-title-period').textContent = `(${report.period})`;

            // Stats
            document.getElementById('stat-reviews').textContent = report.stats.reviews;
            document.getElementById('stat-review-change').textContent = report.stats.reviewChange;
            document.getElementById('stat-rating').textContent = report.stats.rating;
            document.getElementById('stat-themes').textContent = report.stats.themes;

            // Ratings
            const ratingContainer = document.getElementById('rating-bars');
            ratingContainer.innerHTML = '';
            report.ratings.forEach(item => {
                ratingContainer.innerHTML += `
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-1 w-12 justify-end">
                            <span class="font-label-md text-label-md text-on-surface">${item.stars}</span>
                            <span class="material-symbols-outlined text-surface-variant text-sm" style="font-variation-settings: 'FILL' 1;">star</span>
                        </div>
                        <div class="flex-1 h-3 bg-surface-variant rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-secondary-container to-primary-container rounded-full" style="width: ${item.percentage}%"></div>
                        </div>
                        <span class="w-12 text-right font-label-md text-label-md text-on-surface-variant">${item.percentage}%</span>
                    </div>
                `;
            });

            // Themes
            const themesContainer = document.getElementById('themes-container');
            themesContainer.innerHTML = '';
            report.themes.forEach((theme, index) => {
                const isFirst = index === 0;
                const html = `
                    <div class="glass-card overflow-hidden transition-all duration-300" id="${theme.id}-card">
                        <button class="w-full text-left p-6 flex justify-between items-center hover:bg-white/5 transition-colors" onclick="toggleTheme('${theme.id}')">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl bg-primary/10 border border-primary/20 flex items-center justify-center">
                                    <span class="material-symbols-outlined text-primary">${theme.icon}</span>
                                </div>
                                <h3 class="font-headline-md text-headline-md text-on-surface">${theme.title}</h3>
                            </div>
                            <span class="material-symbols-outlined text-on-surface-variant transform transition-transform duration-300" id="${theme.id}-chevron">
                                ${isFirst ? 'expand_less' : 'expand_more'}
                            </span>
                        </button>
                        
                        <div class="theme-content px-6 pb-6 ${isFirst ? 'active' : ''}" id="${theme.id}-content">
                            <div class="bg-surface-variant/30 border border-white/5 rounded-xl p-5 mb-6">
                                <p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                                    <span class="font-bold text-on-surface mr-2">Summary:</span>${theme.summary}
                                </p>
                            </div>

                            <div class="border-b border-white/10 flex gap-6 mb-6">
                                <button class="font-label-md text-label-md pb-2 border-b-2 border-primary text-primary transition-colors tab-btn active" data-target="${theme.id}-actions" onclick="switchTab(event, '${theme.id}')">Actions</button>
                                <button class="font-label-md text-label-md pb-2 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors tab-btn" data-target="${theme.id}-reviews" onclick="switchTab(event, '${theme.id}')">Reviews</button>
                            </div>

                            <div class="tab-pane active" id="${theme.id}-actions">
                                <ul class="space-y-3">
                                    ${theme.actions.map(action => `
                                        <li class="flex items-start gap-3">
                                            <span class="material-symbols-outlined text-secondary-container text-lg mt-0.5">check_circle</span>
                                            <span class="font-body-md text-body-md text-on-surface">${action}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>

                            <div class="tab-pane" id="${theme.id}-reviews">
                                <div class="space-y-4">
                                    ${theme.reviews.map(review => `
                                        <div class="bg-surface/50 border border-white/5 p-4 rounded-lg">
                                            <p class="font-body-md text-body-md text-on-surface-variant italic">"${review}"</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                themesContainer.innerHTML += html;
            });
        }

        function toggleTheme(id) {
            const content = document.getElementById(`${id}-content`);
            const chevron = document.getElementById(`${id}-chevron`);
            
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                setTimeout(() => content.style.display = 'none', 300); 
                chevron.textContent = 'expand_more';
            } else {
                content.style.display = 'block';
                setTimeout(() => content.classList.add('active'), 10);
                chevron.textContent = 'expand_less';
            }
        }

        function switchTab(event, themeId) {
            const targetId = event.currentTarget.getAttribute('data-target');
            const card = document.getElementById(`${themeId}-card`);
            
            card.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'text-primary');
                btn.classList.add('border-transparent', 'text-on-surface-variant');
            });
            event.currentTarget.classList.remove('border-transparent', 'text-on-surface-variant');
            event.currentTarget.classList.add('border-primary', 'text-primary');

            card.querySelectorAll('.tab-pane').forEach(pane => {
                pane.classList.remove('active');
            });
            document.getElementById(targetId).classList.add('active');
        }

        // Initialize
        renderSidebar();
        renderReport();
    </script>
</body></html>
