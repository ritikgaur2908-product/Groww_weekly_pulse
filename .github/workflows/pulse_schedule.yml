name: Weekly Product Review Pulse

on:
  schedule:
    # Run at 08:00 AM IST (which is 02:30 AM UTC) every Monday
    - cron: '30 2 * * 1'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push reports back to the repository

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run Pulse Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          TARGET_DOC_ID: ${{ secrets.TARGET_DOC_ID }}
          TARGET_EMAIL: ${{ secrets.TARGET_EMAIL }}
          PYTHONPATH: src
        run: |
          # Automatically determine the previous ISO week
          # (since this runs on Monday to report on the past week)
          ISO_WEEK=$(date -d "last week" +%G-W%V)
          python -m pulse.cli run --product groww --week $ISO_WEEK

      - name: Commit and push generated reports
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate weekly pulse report" && git push)
